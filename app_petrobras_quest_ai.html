<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrobras Quest AI - Questões Ilimitadas por IA</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .progress-bar {
            transition: width 0.5s ease;
        }
        
        .neon-text {
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #667eea;
        }
        
        .bounce {
            animation: bounce 0.5s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .ai-glow {
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Prompts especializados para cada matéria no estilo CESGRANRIO
        const promptsMateria = {
            portugues: `Você é um especialista em criar questões de concurso no estilo CESGRANRIO para a Petrobras.

INSTRUÇÕES CRÍTICAS:
1. Crie UMA questão de Língua Portuguesa para concurso Petrobras nível médio
2. Estilo CESGRANRIO: enunciado CURTO (2-3 linhas), objetivo, direto
3. 5 alternativas plausíveis
4. Foco em: interpretação, gramática aplicada, concordância, regência, crase
5. Contextualize com temas da indústria (petróleo, energia, sustentabilidade) quando possível
6. Evite textos longos - a CESGRANRIO prefere questões concisas

Retorne APENAS um JSON válido (sem markdown, sem explicações extras):
{
  "enunciado": "texto da questão",
  "alternativas": ["opção A", "opção B", "opção C", "opção D", "opção E"],
  "correta": 0,
  "explicacao": "explicação pedagógica detalhada",
  "assunto": "nome do assunto específico",
  "dificuldade": "Fácil|Média|Difícil"
}`,

            matematica: `Você é um especialista em criar questões de concurso no estilo CESGRANRIO para a Petrobras.

INSTRUÇÕES CRÍTICAS:
1. Crie UMA questão de Matemática para concurso Petrobras nível médio
2. Estilo CESGRANRIO: problema prático, aplicado, DIRETO
3. Números que facilitam cálculo mental (evite cálculos complexos)
4. 5 alternativas com valores próximos (teste atenção do candidato)
5. Foco em: porcentagem, regra de três, razão/proporção, juros simples, geometria básica
6. Contextualize com situações da indústria (produção, volumes, custos, etc)

Retorne APENAS um JSON válido (sem markdown):
{
  "enunciado": "texto do problema",
  "alternativas": ["valor 1", "valor 2", "valor 3", "valor 4", "valor 5"],
  "correta": 0,
  "explicacao": "resolução passo a passo detalhada",
  "assunto": "nome do assunto específico",
  "dificuldade": "Fácil|Média|Difícil"
}`,

            operacao: `Você é um especialista em criar questões de concurso no estilo CESGRANRIO para a Petrobras.

INSTRUÇÕES CRÍTICAS:
1. Crie UMA questão de Conhecimentos Específicos para TÉCNICO DE OPERAÇÃO
2. Estilo CESGRANRIO: prático, aplicado, situacional
3. Temas: processos de refino, segurança operacional, instrumentação, química do petróleo, física aplicada, SMS
4. 5 alternativas objetivas
5. Contexto: plataformas, refinarias, operações reais

Retorne APENAS um JSON válido (sem markdown):
{
  "enunciado": "situação ou pergunta técnica",
  "alternativas": ["opção A", "opção B", "opção C", "opção D", "opção E"],
  "correta": 0,
  "explicacao": "explicação técnica detalhada",
  "assunto": "nome do assunto específico",
  "dificuldade": "Fácil|Média|Difícil"
}`,

            administracao: `Você é um especialista em criar questões de concurso no estilo CESGRANRIO para a Petrobras.

INSTRUÇÕES CRÍTICAS:
1. Crie UMA questão de Conhecimentos Específicos para área ADMINISTRATIVA/LOGÍSTICA
2. Estilo CESGRANRIO: conceitual mas aplicado
3. Temas: gestão de estoques, logística, licitações (Lei 13.303/16), administração geral, contabilidade básica
4. 5 alternativas claras
5. Contexto: situações empresariais reais

Retorne APENAS um JSON válido (sem markdown):
{
  "enunciado": "situação ou pergunta",
  "alternativas": ["opção A", "opção B", "opção C", "opção D", "opção E"],
  "correta": 0,
  "explicacao": "explicação detalhada com conceitos",
  "assunto": "nome do assunto específico",
  "dificuldade": "Fácil|Média|Difícil"
}`,

            seguranca: `Você é um especialista em criar questões de concurso no estilo CESGRANRIO para a Petrobras.

INSTRUÇÕES CRÍTICAS:
1. Crie UMA questão de SEGURANÇA DO TRABALHO
2. Estilo CESGRANRIO: prático, normas aplicadas
3. Temas: NRs (especialmente NR-10, NR-12, NR-35), EPIs, prevenção de acidentes, análise de riscos
4. 5 alternativas objetivas
5. Contexto: indústria petrolífera e situações reais

Retorne APENAS um JSON válido (sem markdown):
{
  "enunciado": "situação ou pergunta sobre segurança",
  "alternativas": ["opção A", "opção B", "opção C", "opção D", "opção E"],
  "correta": 0,
  "explicacao": "explicação com base nas normas",
  "assunto": "nome do assunto específico",
  "dificuldade": "Fácil|Média|Difícil"
}`
        };

        function App() {
            const [tela, setTela] = useState('home');
            const [usuario, setUsuario] = useState({
                nome: '',
                xp: 0,
                nivel: 'Estagiário',
                questoesCertas: 0,
                questoesErradas: 0,
                sequenciaAtual: 0,
                maiorSequencia: 0,
                conquistas: [],
                historico: [],
                questoesGeradas: 0
            });
            const [simuladoAtual, setSimuladoAtual] = useState(null);
            const [questaoAtual, setQuestaoAtual] = useState(0);
            const [respostaSelecionada, setRespostaSelecionada] = useState(null);
            const [mostrarResultado, setMostrarResultado] = useState(false);
            const [cronometro, setCronometro] = useState(0);
            const [cronometroAtivo, setCronometroAtivo] = useState(false);
            const [gerandoQuestoes, setGerandoQuestoes] = useState(false);
            const [erroGeracao, setErroGeracao] = useState(null);

            // Carregar dados salvos
            useEffect(() => {
                const dadosSalvos = localStorage.getItem('petrobrasQuestAI');
                if (dadosSalvos) {
                    setUsuario(JSON.parse(dadosSalvos));
                }
            }, []);

            // Salvar dados
            useEffect(() => {
                if (usuario.nome) {
                    localStorage.setItem('petrobrasQuestAI', JSON.stringify(usuario));
                }
            }, [usuario]);

            // Cronômetro
            useEffect(() => {
                let intervalo;
                if (cronometroAtivo) {
                    intervalo = setInterval(() => {
                        setCronometro(prev => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(intervalo);
            }, [cronometroAtivo]);

            const calcularNivel = (xp) => {
                if (xp < 1000) return 'Estagiário';
                if (xp < 3000) return 'Técnico Júnior';
                if (xp < 6000) return 'Técnico Pleno';
                if (xp < 10000) return 'Técnico Sênior';
                return 'APROVADO! 🎉';
            };

            const formatarTempo = (segundos) => {
                const mins = Math.floor(segundos / 60);
                const secs = segundos % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            // Função para gerar questões via Claude API
            const gerarQuestaoIA = async (materia, dificuldade = null) => {
                try {
                    const prompt = promptsMateria[materia];
                    if (!prompt) {
                        throw new Error('Matéria não encontrada');
                    }

                    const promptComDificuldade = dificuldade 
                        ? prompt.replace('Retorne APENAS', `Gere uma questão de dificuldade ${dificuldade}. Retorne APENAS`)
                        : prompt;

                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1000,
                            messages: [
                                { 
                                    role: 'user', 
                                    content: promptComDificuldade
                                }
                            ]
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Erro na API: ${response.status}`);
                    }

                    const data = await response.json();
                    const textoResposta = data.content[0].text;
                    
                    // Extrair JSON do texto (remover markdown se houver)
                    let jsonTexto = textoResposta;
                    if (textoResposta.includes('```json')) {
                        jsonTexto = textoResposta.split('```json')[1].split('```')[0].trim();
                    } else if (textoResposta.includes('```')) {
                        jsonTexto = textoResposta.split('```')[1].split('```')[0].trim();
                    }
                    
                    const questao = JSON.parse(jsonTexto);
                    
                    // Adicionar metadados
                    questao.materia = materia.charAt(0).toUpperCase() + materia.slice(1);
                    questao.banca = 'CESGRANRIO';
                    questao.geradaPorIA = true;
                    questao.id = Date.now() + Math.random();
                    
                    return questao;
                } catch (error) {
                    console.error('Erro ao gerar questão:', error);
                    throw error;
                }
            };

            // Gerar múltiplas questões
            const gerarQuestoes = async (tipo, quantidade) => {
                const questoes = [];
                const materias = {
                    'portugues': ['portugues'],
                    'matematica': ['matematica'],
                    'operacao': ['operacao'],
                    'administracao': ['administracao'],
                    'seguranca': ['seguranca'],
                    'completo': ['portugues', 'matematica', 'operacao', 'administracao']
                };

                const materiasEscolhidas = materias[tipo] || ['portugues'];
                const questoesPorMateria = Math.ceil(quantidade / materiasEscolhidas.length);

                for (const materia of materiasEscolhidas) {
                    for (let i = 0; i < questoesPorMateria && questoes.length < quantidade; i++) {
                        try {
                            // Ajustar dificuldade baseada no desempenho do usuário
                            let dificuldade = null;
                            const taxaAcerto = usuario.questoesCertas / (usuario.questoesCertas + usuario.questoesErradas || 1);
                            if (taxaAcerto > 0.8) dificuldade = 'Difícil';
                            else if (taxaAcerto > 0.6) dificuldade = 'Média';
                            else if (taxaAcerto < 0.5) dificuldade = 'Fácil';

                            const questao = await gerarQuestaoIA(materia, dificuldade);
                            questoes.push(questao);
                        } catch (error) {
                            console.error(`Erro ao gerar questão ${i + 1}:`, error);
                        }
                    }
                }

                return questoes;
            };

            const iniciarSimulado = async (tipo, quantidade = 5) => {
                setGerandoQuestoes(true);
                setErroGeracao(null);
                setTela('gerando');

                try {
                    const questoes = await gerarQuestoes(tipo, quantidade);
                    
                    if (questoes.length === 0) {
                        throw new Error('Nenhuma questão foi gerada');
                    }

                    setSimuladoAtual({
                        tipo,
                        questoes,
                        respostas: new Array(questoes.length).fill(null),
                        iniciado: Date.now()
                    });

                    // Atualizar contador de questões geradas
                    setUsuario(prev => ({
                        ...prev,
                        questoesGeradas: prev.questoesGeradas + questoes.length
                    }));

                    setQuestaoAtual(0);
                    setRespostaSelecionada(null);
                    setMostrarResultado(false);
                    setCronometro(0);
                    setCronometroAtivo(true);
                    setGerandoQuestoes(false);
                    setTela('simulado');
                } catch (error) {
                    console.error('Erro ao iniciar simulado:', error);
                    setErroGeracao(error.message);
                    setGerandoQuestoes(false);
                    setTela('home');
                    alert(`Erro ao gerar questões: ${error.message}\n\nTente novamente em alguns segundos.`);
                }
            };

            const responderQuestao = (indiceResposta) => {
                if (mostrarResultado) return;
                setRespostaSelecionada(indiceResposta);
            };

            const confirmarResposta = () => {
                if (respostaSelecionada === null) return;

                const questao = simuladoAtual.questoes[questaoAtual];
                const acertou = respostaSelecionada === questao.correta;

                const novasRespostas = [...simuladoAtual.respostas];
                novasRespostas[questaoAtual] = {
                    selecionada: respostaSelecionada,
                    correta: acertou
                };

                setSimuladoAtual({
                    ...simuladoAtual,
                    respostas: novasRespostas
                });

                let novoXP = usuario.xp;
                let novaSequencia = usuario.sequenciaAtual;
                let novasConquistas = [...usuario.conquistas];

                if (acertou) {
                    novoXP += 10;
                    novaSequencia += 1;

                    if (novaSequencia === 10 && !novasConquistas.includes('combo10')) {
                        novoXP += 50;
                        novasConquistas.push('combo10');
                        setTimeout(() => alert('🎉 COMBO! +50 XP por 10 acertos seguidos!'), 500);
                    }

                    if (novaSequencia === 20 && !novasConquistas.includes('combo20')) {
                        novoXP += 100;
                        novasConquistas.push('combo20');
                        setTimeout(() => alert('🔥 COMBO INSANO! +100 XP por 20 acertos seguidos!'), 500);
                    }

                    setUsuario({
                        ...usuario,
                        xp: novoXP,
                        questoesCertas: usuario.questoesCertas + 1,
                        sequenciaAtual: novaSequencia,
                        maiorSequencia: Math.max(novaSequencia, usuario.maiorSequencia),
                        nivel: calcularNivel(novoXP),
                        conquistas: novasConquistas
                    });
                } else {
                    if (novaSequencia > 0) {
                        novoXP = Math.max(0, novoXP - 20);
                    }
                    novaSequencia = 0;

                    setUsuario({
                        ...usuario,
                        xp: novoXP,
                        questoesErradas: usuario.questoesErradas + 1,
                        sequenciaAtual: 0,
                        nivel: calcularNivel(novoXP)
                    });
                }

                setMostrarResultado(true);
            };

            const proximaQuestao = () => {
                if (questaoAtual < simuladoAtual.questoes.length - 1) {
                    setQuestaoAtual(questaoAtual + 1);
                    setRespostaSelecionada(null);
                    setMostrarResultado(false);
                } else {
                    finalizarSimulado();
                }
            };

            const finalizarSimulado = () => {
                setCronometroAtivo(false);

                const totalAcertos = simuladoAtual.respostas.filter(r => r && r.correta).length;
                const totalQuestoes = simuladoAtual.questoes.length;
                const percentual = Math.round((totalAcertos / totalQuestoes) * 100);

                let bonusXP = 200;
                
                // Bônus por desempenho
                if (percentual >= 90) bonusXP += 100;
                else if (percentual >= 80) bonusXP += 50;

                const novoHistorico = [...usuario.historico, {
                    data: new Date().toISOString(),
                    tipo: simuladoAtual.tipo,
                    acertos: totalAcertos,
                    total: totalQuestoes,
                    percentual,
                    tempo: cronometro
                }];

                let novasConquistas = [...usuario.conquistas];
                if (percentual >= 90 && !novasConquistas.includes('perfeccionista')) {
                    novasConquistas.push('perfeccionista');
                }
                if (usuario.historico.length + 1 >= 10 && !novasConquistas.includes('maratonista')) {
                    novasConquistas.push('maratonista');
                }

                setUsuario({
                    ...usuario,
                    xp: usuario.xp + bonusXP,
                    historico: novoHistorico,
                    conquistas: novasConquistas
                });

                setTela('resultado');
            };

            const voltarHome = () => {
                setTela('home');
                setSimuladoAtual(null);
                setQuestaoAtual(0);
                setCronometro(0);
                setCronometroAtivo(false);
            };

            // Tela de Geração
            if (tela === 'gerando') {
                return (
                    <div className="min-h-screen gradient-bg flex items-center justify-center">
                        <div className="bg-white rounded-2xl shadow-2xl p-12 max-w-md w-full text-center ai-glow">
                            <div className="mb-6">
                                <div className="inline-block p-6 bg-purple-100 rounded-full pulse">
                                    <i className="fas fa-robot text-6xl text-purple-600"></i>
                                </div>
                            </div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-4">
                                🤖 IA Gerando Questões
                            </h2>
                            <p className="text-gray-600 text-lg mb-6">
                                A Inteligência Artificial está criando questões personalizadas para você no estilo CESGRANRIO
                                <span className="loading-dots"></span>
                            </p>
                            <div className="space-y-3 text-left bg-purple-50 p-4 rounded-lg">
                                <div className="flex items-center space-x-3">
                                    <i className="fas fa-check-circle text-green-500"></i>
                                    <span className="text-sm text-gray-700">Analisando seu desempenho</span>
                                </div>
                                <div className="flex items-center space-x-3">
                                    <i className="fas fa-check-circle text-green-500"></i>
                                    <span className="text-sm text-gray-700">Ajustando dificuldade</span>
                                </div>
                                <div className="flex items-center space-x-3">
                                    <i className="fas fa-spinner fa-spin text-purple-500"></i>
                                    <span className="text-sm text-gray-700">Criando questões inéditas...</span>
                                </div>
                            </div>
                            <div className="mt-6">
                                <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-purple-400 to-purple-600 rounded-full animate-pulse" style={{width: '70%'}}></div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Tela Home
            if (tela === 'home') {
                return (
                    <div className="min-h-screen gradient-bg">
                        {/* Header */}
                        <div className="bg-white shadow-lg">
                            <div className="container mx-auto px-4 py-6">
                                <div className="flex items-center justify-between flex-wrap gap-4">
                                    <div className="flex items-center space-x-4">
                                        <div className="w-16 h-16 bg-gradient-to-br from-purple-400 to-purple-600 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg">
                                            <i className="fas fa-robot"></i>
                                        </div>
                                        <div>
                                            <h1 className="text-3xl font-bold text-gray-800">Petrobras Quest AI</h1>
                                            <p className="text-gray-600">Questões Ilimitadas com Inteligência Artificial</p>
                                        </div>
                                    </div>
                                    
                                    {!usuario.nome ? (
                                        <button
                                            onClick={() => {
                                                const nome = prompt('Qual é o seu nome?');
                                                if (nome) {
                                                    setUsuario({ ...usuario, nome });
                                                }
                                            }}
                                            className="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-semibold transition"
                                        >
                                            Começar Agora
                                        </button>
                                    ) : (
                                        <div className="text-right">
                                            <p className="text-2xl font-bold text-gray-800">{usuario.nome}</p>
                                            <p className="text-purple-600 font-semibold">{usuario.nivel}</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {usuario.nome && (
                            <div className="container mx-auto px-4 py-8">
                                {/* Status do Usuário */}
                                <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
                                    <div className="bg-white rounded-xl shadow-lg p-6 card-hover">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <p className="text-gray-600 text-sm">XP Total</p>
                                                <p className="text-3xl font-bold text-purple-600">{usuario.xp}</p>
                                            </div>
                                            <div className="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                                                <i className="fas fa-star text-purple-600 text-xl"></i>
                                            </div>
                                        </div>
                                        <div className="mt-4">
                                            <div className="h-2 bg-gray-200 rounded-full">
                                                <div 
                                                    className="h-full bg-gradient-to-r from-purple-400 to-purple-600 rounded-full progress-bar"
                                                    style={{ width: `${(usuario.xp % 1000) / 10}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-lg p-6 card-hover">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <p className="text-gray-600 text-sm">Taxa</p>
                                                <p className="text-3xl font-bold text-green-600">
                                                    {usuario.questoesCertas + usuario.questoesErradas > 0 
                                                        ? Math.round((usuario.questoesCertas / (usuario.questoesCertas + usuario.questoesErradas)) * 100)
                                                        : 0}%
                                                </p>
                                            </div>
                                            <div className="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                                                <i className="fas fa-check text-green-600 text-xl"></i>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-lg p-6 card-hover">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <p className="text-gray-600 text-sm">Sequência</p>
                                                <p className="text-3xl font-bold text-orange-600">{usuario.sequenciaAtual}</p>
                                            </div>
                                            <div className="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                                                <i className="fas fa-fire text-orange-600 text-xl"></i>
                                            </div>
                                        </div>

                                            <i className="fas fa-home mr-2"></i>
                                            Voltar ao Início
                                        </button>
                                        <button
                                            onClick={() => iniciarSimulado(simuladoAtual.tipo, simuladoAtual.questoes.length)}
                                            className="flex-1 bg-green-600 hover:bg-green-700 text-white py-4 rounded-lg font-semibold transition"
                                        >
                                            <i className="fas fa-robot mr-2"></i>
                                            Gerar Novas Questões
                                        </button>
                                    </div>
                                </div>

                                {percentual >= 90 && (
                                    <div className="mt-8 bg-gradient-to-r from-yellow-400 to-yellow-600 rounded-xl shadow-2xl p-6 text-white text-center">
                                        <i className="fas fa-trophy text-6xl mb-4"></i>
                                        <h3 className="text-2xl font-bold mb-2">🏆 Nova Conquista!</h3>
                                        <p className="text-xl">"Perfeccionista IA" - 90%+ em questões geradas por IA!</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
