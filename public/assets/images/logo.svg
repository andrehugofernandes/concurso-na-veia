<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="100%" height="100%">
  <defs>
    <!-- Gradiente do raio (rosa/magenta para verde-limão brilhante) -->
    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E91E8C" />
      <stop offset="100%" stop-color="#00E676" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Grupo do Ícone (Raio) -->
  <g transform="translate(10, 10)">
    <!-- Fundo escuro do badge (assim como no Admin Premium) -->
    <rect x="0" y="0" width="80" height="80" rx="12" fill="#000000" stroke="#333333" stroke-width="1" />
    <!-- Brilho sutil interno -->
    <rect x="2" y="2" width="76" height="76" rx="10" fill="#E91E8C" fill-opacity="0.08" />
    <!-- Raio Vetorial -->
    <path d="M48,12 L22,46 L38,46 L30,72 L58,34 L40,34 Z" fill="url(#lightningGrad)" filter="url(#neonGlow)" />
  </g>

  <!-- Grupo de Textos (Versão sobre fundo escuro/tarja preta) -->
  <g transform="translate(105, 12)">
    <!-- "A VAGA" (Branco) -->
    <text x="0" y="38" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" letter-spacing="1">A VAGA</text>
    <!-- "EH MINHA" (Verde-limão/Ciano brilhante do tema) -->
    <text x="142" y="38" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="44" font-weight="900" fill="#00E676" letter-spacing="1">EH MINHA</text>
    <!-- Subtítulo "SIMULADOR DE CONCURSOS" -->
    <text x="2" y="65" font-family="'Montserrat', 'Arial', sans-serif" font-size="11.5" font-weight="900" fill="#A0AEC0" letter-spacing="4.8">SIMULADOR DE CONCURSOS</text>
  </g>
</svg>
